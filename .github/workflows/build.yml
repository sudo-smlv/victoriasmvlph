name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main, feat/cla-5-integration]
  pull_request:
    branches: [main, feat/cla-5-integration, 'fix/**']
  workflow_dispatch:

# Workflow-level env: force every JS action to Node 24 even if a pinned
# major still defaults to Node 20. Keep this as a rollback safety net.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint pinned actions
        # Regression guard: fail fast if any actions/* reference is pinned
        # below the Node-24-ready major floor. Runs in seconds; no
        # dependencies. See scripts/lint-actions.sh for the floor table.
        run: ./scripts/lint-actions.sh
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Show runtime versions
        run: |
          echo "Runner OS: ${{ runner.os }}"
          node -v
          npm -v
      - name: Determine base path
        id: basepath
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "value=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build static site
        env:
          BASE_PATH: ${{ steps.basepath.outputs.value }}
        run: npm install --no-audit --no-fund && npm run build
      - name: Deploy to gh-pages branch
        if: github.event_name == 'push'
        permissions:
          contents: write
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
