name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main, feat/cla-5-integration, 'fix/**']
  pull_request:
    branches: [main, feat/cla-5-integration, 'fix/**']
  workflow_dispatch:

# Workflow-level env: force every JS action to Node 24 even if a pinned
# major still defaults to Node 20. Keep this as a rollback safety net.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Show runtime versions
        run: |
          echo "Runner OS: ${{ runner.os }}"
          node -v
          npm -v
      - name: Determine base path
        id: basepath
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "value=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build static site
        env:
          BASE_PATH: ${{ steps.basepath.outputs.value }}
        run: npm install --no-audit --no-fund && npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/cla-5-integration')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
