name: Build

on:
  push:
    branches: [feat/cla-5-integration]
  pull_request:
    branches: [feat/cla-5-integration]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: viktoria-landing-build
          path: build/
