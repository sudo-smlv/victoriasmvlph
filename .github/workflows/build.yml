name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main, feat/cla-5-integration]
  pull_request:
    branches: [main, feat/cla-5-integration, 'fix/**']
  workflow_dispatch:

# Workflow-level env: force every JS action to Node 24 even if a pinned
# major still defaults to Node 20. Keep this as a rollback safety net.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Lint pinned actions
        # Regression guard: fail fast if any actions/* reference is pinned
        # below the Node-24-ready major floor. Runs in seconds; no
        # dependencies. See scripts/lint-actions.sh for the floor table.
        run: ./scripts/lint-actions.sh
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Show runtime versions
        run: |
          echo "Runner OS: ${{ runner.os }}"
          node -v
          npm -v
      - name: Determine base path
        id: basepath
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "value=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build static site
        env:
          BASE_PATH: ${{ steps.basepath.outputs.value }}
        run: npm install --no-audit --no-fund && npm run build
      - name: Deploy to gh-pages branch
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build

  lint-pr-author:
    name: Lint PR head commit author
    # Network-side guard for the per-agent git identity policy (see
    # CLAAAAA-168). Only runs on pull_request to main, so feature branches
    # and direct pushes are not affected. The lint is non-authoritative on
    # the first run after a rebase that drops the policy file, because
    # the script degrades gracefully when .paperclip/git-identity.json
    # is missing (with a warning, exit 0).
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the head commit author is resolvable on the
          # merge ref.
          fetch-depth: 0
      - name: Lint PR head commit author
        # Reads .paperclip/git-identity.json, compares the head commit
        # author against the allow-list, and fails with an actionable
        # error if the identity is not in the policy. Historic rebase
        # opt-out: PAPERCLIP_SKIP_IDENTITY_CHECK=1.
        run: ./scripts/check-pr-author.sh
